<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | SmartCampus Admin'">Event Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dark-body">
<header class="site-header">
    <div class="shell header-row">
        <div class="brand-block">
            <div class="brand-logo">SA</div>
            <div>
                <strong>SmartCampus Admin</strong>
            </div>
        </div>

        <div class="header-actions">
            <a class="ghost-link" th:href="@{/admin}">Back to Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="btn btn-soft" type="submit">Logout</button>
            </form>
        </div>
    </div>
</header>

<main class="shell admin-shell">
    <section class="surface-card admin-form-card">
        <div class="card-head">
            <div class="eyebrow">Event Management</div>
            <h1 class="compact-title small-title" th:text="${pageTitle}">Create Event</h1>
            <p class="subtle-text">Fill the details clearly to publish a college event.</p>
        </div>

        <form th:action="${formAction}" th:object="${eventForm}" method="post" class="admin-form-grid">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div>
                <label for="name">Event Name</label>
                <input id="name" type="text" th:field="*{name}">
                <div class="error-box" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div>
                <label for="department">Host Unit</label>
                <input id="department" type="text" th:field="*{department}" placeholder="Computer Science Department / Robotics Club / TechFest Core Team">
                <div class="error-box" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
            </div>
            <div>
                <label for="category">Section</label>
                <select id="category" th:field="*{category}">
                    <option value="">Select section</option>
                    <option th:each="eventCategory : ${eventCategories}" th:value="${eventCategory}" th:text="${eventCategory.displayName}"></option>
                </select>
                <div class="error-box" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>
            <div>
                <label for="type">Type</label>
                <select id="type" th:field="*{type}">
                    <option value="">Select type</option>
                    <option th:each="eventType : ${eventTypes}" th:value="${eventType}" th:text="${eventType}"></option>
                </select>
                <div class="error-box" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
            </div>
            <div>
                <label for="venue">Venue</label>
                <input id="venue" type="text" th:field="*{venue}">
                <div class="error-box" th:if="${#fields.hasErrors('venue')}" th:errors="*{venue}"></div>
            </div>
            <div>
                <label for="eventDateTime">Event Date & Time</label>
                <input id="eventDateTime" type="datetime-local" th:field="*{eventDateTime}">
                <div class="error-box" th:if="${#fields.hasErrors('eventDateTime')}" th:errors="*{eventDateTime}"></div>
            </div>
            <div>
                <label for="ticketPrice">Ticket Price</label>
                <input id="ticketPrice" type="number" step="0.01" min="0" th:field="*{ticketPrice}">
                <div class="error-box" th:if="${#fields.hasErrors('ticketPrice')}" th:errors="*{ticketPrice}"></div>
            </div>
            <div>
                <label for="capacity">Capacity</label>
                <input id="capacity" type="number" min="1" th:field="*{capacity}">
                <div class="error-box" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
            </div>
            <div class="publish-box">
                <label class="toggle-check">
                    <input type="checkbox" th:field="*{published}">
                    <span>Publish event immediately</span>
                </label>
            </div>

            <div class="full-span">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}"></textarea>
                <div class="error-box" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div class="full-span form-actions">
                <button class="btn btn-gradient" type="submit">Save Event</button>
                <a class="btn btn-soft" th:href="@{/admin}">Cancel</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
