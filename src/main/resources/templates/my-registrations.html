<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Registrations | SmartCampus Events</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dark-body">
<header class="site-header">
    <div class="shell header-row">
        <div class="brand-block">
            <div class="brand-logo">SC</div>
            <div>
                <strong>SmartCampus Events</strong>
            </div>
        </div>

        <div class="header-actions">
            <a class="ghost-link" th:href="@{/}">All Events</a>
            <a class="btn btn-soft" th:href="@{/login}">Admin Login</a>
        </div>
    </div>
</header>

<main class="shell public-shell">
    <section class="surface-card search-card">
        <div class="card-head">
            <div class="eyebrow">Registration Status</div>
            <h1 class="compact-title small-title">Check your registrations</h1>
            <p class="subtle-text">Enter the email used during booking.</p>
        </div>

        <div class="alert" th:if="${successMessage}" th:text="${successMessage}">Registration completed successfully.</div>

        <form class="inline-form" method="get" th:action="@{/my-registrations}">
            <input type="email" name="email" placeholder="student@example.edu" th:value="${lookupEmail}">
            <button class="btn btn-gradient" type="submit">Fetch</button>
        </form>
    </section>

    <section class="event-grid" style="margin-top: 28px;" th:if="${registrations != null}">
        <div class="empty dark-empty" th:if="${#lists.isEmpty(registrations)}">No registrations were found for this email address.</div>

        <article class="surface-card event-card" th:each="registration : ${registrations}">
            <div class="chip-row">
                <span class="chip chip-primary" th:text="${registration.event.type}">WORKSHOP</span>
                <span class="chip" th:text="${registration.participantType}">INTERNAL</span>
            </div>

            <div class="event-content">
                <h3 th:text="${registration.event.name}">Event</h3>
                <p class="subtle-text event-host" th:text="${registration.event.department}">Host</p>
                <p class="event-description" th:text="${registration.event.description}">Description</p>
                <div class="meta-list compact-meta">
                    <span th:text="${#temporals.format(registration.registeredAt, 'dd MMM yyyy, hh:mm a')}">Time</span>
                    <span th:text="${registration.event.venue}">Venue</span>
                    <span th:text="'Tickets: ' + ${registration.ticketsBooked}">Tickets</span>
                </div>
            </div>

            <div class="event-actions">
                <a class="btn btn-soft" th:href="@{|/events/${registration.event.id}|}">View Event</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
