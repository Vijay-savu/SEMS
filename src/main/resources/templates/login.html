<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SmartCampus Events</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dark-body">
<main class="shell auth-shell">
    <section class="auth-copy">
        <div class="eyebrow">Admin Access</div>
        <h1 class="compact-title">Manage college events from one place.</h1>
        <p class="lead-text">Login to create events, review registrations, and manage published listings.</p>
        <a class="text-link" th:href="@{/}">Back to event portal</a>
    </section>

    <section class="surface-card auth-box">
        <div class="card-head">
            <h2>Admin Login</h2>
            <p class="subtle-text">Use your admin credentials to continue.</p>
        </div>

        <div class="alert" th:if="${param.logout}">You have been logged out.</div>
        <div class="error-box" th:if="${param.error}">Invalid username or password. Please try again.</div>

        <form th:action="@{/login}" method="post" class="stack-form">
            <div>
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="Enter username" autofocus>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password">
            </div>
            <button class="btn btn-gradient" type="submit">Login</button>
        </form>
    </section>
</main>
</body>
</html>
