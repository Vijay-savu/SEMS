<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | SmartCampus Events</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="dark-body">
<main class="shell public-shell">
    <section class="surface-card admin-hero">
        <div class="eyebrow">Action Interrupted</div>
        <h1 class="compact-title small-title" style="margin-top: 10px;" th:text="${errorTitle ?: 'Something went wrong'}">Something went wrong</h1>
        <p class="subtle-text" style="margin-top: 14px;" th:text="${errorMessage ?: 'Please go back and try again.'}">Error message</p>
        <div class="form-actions" style="margin-top: 18px;">
            <a class="btn btn-gradient" th:href="@{/}">Back to Events</a>
            <a class="btn btn-soft" th:href="@{/admin}">Admin</a>
        </div>
    </section>
</main>
</body>
</html>
