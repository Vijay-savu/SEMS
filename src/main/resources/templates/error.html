<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Smart Campus</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <section class="panel" style="margin-top: 48px;">
        <div class="eyebrow">Action Interrupted</div>
        <h1 style="font-size: 2.4rem; margin-top: 10px;" th:text="${errorTitle ?: 'Something went wrong'}">Something went wrong</h1>
        <p class="subtext" th:text="${errorMessage ?: 'Please go back and try again.'}">Error message</p>
        <div class="actions" style="margin-top: 18px;">
            <a class="btn btn-primary" th:href="@{/portal}">Back to Portal</a>
            <a class="btn btn-secondary" th:href="@{/admin}">Admin</a>
        </div>
    </section>
</div>
</body>
</html>
